name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend and MCP
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:4000
      BACKEND_API_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      CRON_SECRET: ci-cron-secret
      GSC_CLIENT_EMAIL: ci@example.com
      GSC_PRIVATE_KEY: "ci-private-key"
      GSC_SITE_URL: https://example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: FastAPI backend
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      CORS_ORIGINS: http://localhost:4000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend

      - name: Import FastAPI app
        run: python -c "from backend.app.main import app; print(app.title)"
